<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>個人資產部位視覺化</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
</head>
<body>
    <header>
        <h1>資產總覽儀表板</h1>
        <div class="last-updated">最後更新: 2025年12月</div>
    </header>

    <main>
        <!-- 維度篩選區塊 -->
        <section class="filter-section card">
            <h2>多維度篩選</h2>
            <div class="filter-grid">
                <div class="filter-item">
                    <label for="bank-filter">銀行</label>
                    <select id="bank-filter">
                        <option value="all">全部銀行</option>
                    </select>
                </div>
                <div class="filter-item">
                    <label for="currency-filter">幣別</label>
                    <select id="currency-filter">
                        <option value="all">全部幣別</option>
                        <option value="USD">USD 美元</option>
                        <option value="NTD">NTD 台幣</option>
                        <option value="CNY">CNY 人民幣</option>
                    </select>
                </div>
                <div class="filter-item">
                    <label for="dividend-filter">配息類型</label>
                    <select id="dividend-filter">
                        <option value="all">全部</option>
                        <option value="月">月配息</option>
                        <option value="無">無配息</option>
                    </select>
                </div>
                <!-- 可以擴增年份或季度篩選 -->
            </div>
        </section>

        <!-- 總資產 Overview 區塊 -->
        <section class="overview-section">
            <div class="card chart-container">
                <h2>總資產月度走勢 (NTD)</h2>
                <div style="position: relative; height:300px;">
                     <canvas id="totalAssetChart"></canvas>
                </div>
            </div>
            
            <div class="card chart-container">
                <h2>銀行現金流 (累計配息)</h2>
                <div style="position: relative; height:300px;">
                     <canvas id="cashFlowChart"></canvas>
                </div>
            </div>

            <div class="card chart-container">
                <h2>資產佔比分析</h2>
                <div class="toggle-group">
                    <button class="toggle-btn active" data-target="bank">依銀行</button>
                    <button class="toggle-btn" data-target="currency">依幣別</button>
                </div>
                <div style="position: relative; height:300px;">
                     <canvas id="distributionChart"></canvas>
                </div>
            </div>
        </section>

        <!-- 個別基金深入區塊 -->
        <section class="detail-section card">
            <div class="detail-header">
                <h2>個別基金深入分析</h2>
                <div class="fund-selector">
                    <label for="fund-filter">選擇基金：</label>
                    <select id="fund-filter">
                        <!-- Options generated dynamically -->
                    </select>
                </div>
            </div>
            
            <div class="fund-info-card" id="fund-info-display">
                <!-- 漲跌指標與基礎資訊 -->
                <div class="info-row">
                    <span class="info-label">目前現值：</span>
                    <span id="fund-current-value" class="info-value">--</span>
                    <span id="fund-trend-indicator" class="trend-icon"></span>
                </div>
                <div class="info-row">
                    <span class="info-label">累計配息：</span>
                    <span id="fund-dividend" class="info-value">--</span>
                </div>
            </div>

            <div class="chart-container">
                <div class="toggle-group">
                    <button class="toggle-btn return-toggle active" data-mode="inclusive">含息報酬 (總價值)</button>
                    <button class="toggle-btn return-toggle" data-mode="exclusive">不含息報酬 (僅資本利得)</button>
                </div>
                <div style="position: relative; height:300px;">
                    <canvas id="fundDetailChart"></canvas>
                </div>
            </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
