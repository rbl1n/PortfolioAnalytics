<!DOCTYPE html>
<html lang="zh-Hant" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>資產部位儀表板</title>
    <meta name="description" content="個人資產部位視覺化決策儀表板">

    <!-- Pico CSS (Classless + Minimal) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Custom Styles -->
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <header class="container">
        <nav>
            <ul>
                <li><strong>📊 資產部位儀表板</strong></li>
            </ul>
            <ul>
                <li><small class="last-updated">最後更新: 2025年12月</small></li>
                <li>
                    <button id="theme-toggle" class="outline contrast" aria-label="切換深色模式">🌙</button>
                </li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <!-- Tab Navigation -->
        <nav id="tab-bar" class="tab-bar" role="tablist">
            <button class="tab-btn active" data-tab="watchlist" role="tab" aria-selected="true">
                📋 部位總覽
            </button>
            <button class="tab-btn" data-tab="chart" role="tab" aria-selected="false">
                📈 走勢分析
            </button>
            <button class="tab-btn" data-tab="fund-info" role="tab" aria-selected="false">
                📄 基金資料
            </button>
            <button class="tab-btn" data-tab="analysis" role="tab" aria-selected="false">
                🔍 庫存分析
            </button>
        </nav>

        <!-- ==================== Tab 1: Watchlist ==================== -->
        <section id="panel-watchlist" role="tabpanel">
            <!-- Tag Filters -->
            <div id="tag-filters" class="tag-filters-container"></div>

            <!-- Preset Selector -->
            <div id="preset-selector" class="preset-container"></div>

            <!-- Watchlist Table -->
            <div id="watchlist-table" class="table-container"></div>
        </section>

        <!-- ==================== Tab 2: Chart ==================== -->
        <section id="panel-chart" role="tabpanel" hidden>
            <!-- Summary Card -->
            <article id="chart-summary-card" class="summary-card"></article>

            <!-- Fund Selector -->
            <div class="chart-controls">
                <select id="chart-fund-select" aria-label="選擇基金"></select>
            </div>

            <!-- Per-Fund Dividend Toggle -->
            <div id="div-toggle-row" class="div-toggle-container"></div>

            <!-- Comparison Controls (with Fuzzy Search) -->
            <div id="comparison-controls" class="comparison-container"></div>

            <!-- Chart Canvas -->
            <div class="chart-wrapper">
                <canvas id="trendChart"></canvas>
            </div>
        </section>

        <!-- ==================== Tab 3: Fund Info (Shell) ==================== -->
        <section id="panel-fund-info" role="tabpanel" hidden>
            <!-- Rendered by fund-info.js -->
        </section>

        <!-- ==================== Tab 4: Analysis ==================== -->
        <section id="panel-analysis" role="tabpanel" hidden>
            <!-- Total Asset Trend -->
            <article>
                <header>
                    <h2>總資產走勢</h2>
                </header>
                <div class="chart-wrapper">
                    <canvas id="totalAssetChart2"></canvas>
                </div>
            </article>

            <!-- Distribution -->
            <article>
                <header>
                    <h2>資產配置分佈</h2>
                    <div class="toggle-group">
                        <button class="dist-toggle active" data-mode="bank">依銀行</button>
                        <button class="dist-toggle" data-mode="currency">依幣別</button>
                        <button class="dist-toggle" data-mode="dividendType">依配息</button>
                    </div>
                </header>
                <div class="chart-wrapper">
                    <canvas id="distributionChart2"></canvas>
                </div>
            </article>

            <!-- Monthly Dividend Income -->
            <article>
                <header>
                    <h2>月配息收入</h2>
                </header>
                <div class="chart-wrapper">
                    <canvas id="dividendIncomeChart"></canvas>
                </div>
            </article>

            <!-- P/L Ranking -->
            <article>
                <header>
                    <h2>損益排行</h2>
                </header>
                <div class="chart-wrapper chart-wrapper-tall">
                    <canvas id="plRankingChart"></canvas>
                </div>
            </article>

            <!-- Bank Cash Flow -->
            <article>
                <header>
                    <h2>銀行現金流（累計配息）</h2>
                </header>
                <div class="chart-wrapper">
                    <canvas id="cashFlowChart2"></canvas>
                </div>
            </article>
        </section>
    </main>

    <!-- Theme Toggle Script (inline, runs before module) -->
    <script>
        const toggle = document.getElementById('theme-toggle');
        const html = document.documentElement;
        const stored = localStorage.getItem('theme');
        if (stored) html.setAttribute('data-theme', stored);
        toggle.textContent = html.getAttribute('data-theme') === 'dark' ? '☀️' : '🌙';
        toggle.addEventListener('click', () => {
            const current = html.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
            toggle.textContent = next === 'dark' ? '☀️' : '🌙';
        });
    </script>

    <!-- App Entry Point (ES Module) -->
    <script type="module" src="js/main.js"></script>
</body>

</html>
